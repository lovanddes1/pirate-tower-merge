<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>海盜砲塔合成防禦戰</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 0%, #1b3a5c 0%, #0b1f33 60%, #060f1a 100%);
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    overflow: hidden; overscroll-behavior: none; user-select: none;
  }
  #wrap {
    width: 100vw; height: 100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position: relative;
  }
  canvas {
    background: #0e2a44;
    max-width: 94%;
    max-height: 90%;
    width: auto; height: auto;
    border: 4px solid #6b4423;
    border-radius: 10px;
    box-shadow: 0 0 0 4px #3e2b1a, 0 10px 40px rgba(0,0,0,0.6);
    touch-action: none;
    cursor: pointer;
  }
  /* 全螢幕模式：取消寬高上限，讓畫布依照 JS 算出的實際可用空間完全填滿螢幕 */
  #wrap.fs-mode canvas {
    max-width: 100%;
    max-height: 100%;
  }
  #wrap.fs-mode #hint,
  #wrap.fs-mode #fsBtn { display: none; }
  #hint {
    color: #cfe3f5; opacity:0.75; font-size:13px; margin-top:6px; text-align:center;
    max-width:94%;
  }
  #fsBtn {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background:#37474f; color:#fff; border:2px solid #6b4423; border-radius:8px;
    padding:8px 14px; font-size:14px; font-family:inherit; cursor:pointer;
  }
  #fsBtn:active{ background:#546e7a; }
  #muteBtn {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    background:#37474f; color:#fff; border:2px solid #6b4423; border-radius:8px;
    padding:8px 12px; font-size:16px; font-family:inherit; cursor:pointer;
    width:44px; text-align:center;
  }
  #muteBtn:active{ background:#546e7a; }
  #wrap.fs-mode #muteBtn { display: none; }

  /* 手機仍為直向時的保險機制：用 CSS 把整個畫面轉 90 度撐滿螢幕，
     模擬橫向全螢幕效果（給不支援 screen.orientation.lock 的瀏覽器，如 iOS Safari）。
     只要瀏覽器實際支援自動橫向鎖定，畫面會直接變成真的橫向，這段CSS就不會生效。 */
  @media screen and (max-width: 900px) and (orientation: portrait) {
    #wrap {
      position: fixed;
      top: 0; left: 100%;
      width: 100vh;
      height: 100vw;
      transform-origin: top left;
      transform: rotate(90deg);
    }
  }
</style>
</head>
<body>

// ============ 音效與音樂系統 ============
// 全部使用 Web Audio API 即時合成產生，不依賴外部音檔(離線單一HTML檔也能正常播放)。
// AudioContext 必須在使用者手勢(點擊/觸控)後才能啟動，故於 onClick / muteBtn 首次觸發時解鎖。
const AudioSys = (function(){
  let ctx = null, masterGain = null, musicGain = null, sfxGain = null;
  let muted = false;
  let musicStarted = false, musicHandle = null, nextNoteTime = 0, beatIdx = 0;

  try{
    const saved = localStorage.getItem('ptmd_muted');
    if(saved === '1') muted = true;
  }catch(e){}

  function ensureCtx(){
    if(!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      ctx = new AC();
      masterGain = ctx.createGain(); masterGain.gain.value = muted ? 0 : 1;
      masterGain.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value = 0.25;
      musicGain.connect(masterGain);
      sfxGain = ctx.createGain(); sfxGain.gain.value = 0.55;
      sfxGain.connect(masterGain);
    }
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function setMuted(m){
    muted = m;
    if(masterGain) masterGain.gain.setTargetAtTime(muted?0:1, ctx.currentTime, 0.02);
    try{ localStorage.setItem('ptmd_muted', muted?'1':'0'); }catch(e){}
  }
  function toggleMuted(){ ensureCtx(); setMuted(!muted); return muted; }
  function isMuted(){ return muted; }

  // ---- 短音效(合成音波，附上快速的音量包絡避免爆音) ----
  function tone(freq, dur, type, vol, delay, slideTo){
    const c = ensureCtx();
    if(!c || muted) return;
    const t0 = c.currentTime + (delay||0);
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type||'sine';
    osc.frequency.setValueAtTime(Math.max(20,freq), t0);
    if(slideTo!==undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t0+dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002,vol), t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t0); osc.stop(t0+dur+0.03);
  }
  function noise(dur, vol, delay, filterFreq){
    const c = ensureCtx();
    if(!c || muted) return;
    const t0 = c.currentTime + (delay||0);
    const n = Math.max(1, Math.floor(c.sampleRate*dur));
    const buf = c.createBuffer(1, n, c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<n;i++) data[i] = (Math.random()*2-1) * (1 - i/n);
    const src = c.createBufferSource(); src.buffer = buf;
    const filt = c.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value = filterFreq||1500;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    src.connect(filt); filt.connect(g); g.connect(sfxGain);
    src.start(t0); src.stop(t0+dur+0.03);
  }

  const sfx = {
    shoot(){ tone(560,0.08,'square',0.11,0,260); },
    sniperShoot(){ tone(1500,0.12,'sawtooth',0.09,0,420); },
    splashShoot(){ noise(0.1,0.18,0,900); tone(170,0.13,'sine',0.09); },
    freezeShoot(){ tone(1700,0.12,'sine',0.09,0,2100); },
    hitImpact(){ noise(0.06,0.09,0,2200); },
    enemyDeath(){ tone(300,0.2,'sawtooth',0.14,0,55); },
    shipSink(){ noise(0.35,0.22,0,450); tone(140,0.35,'sine',0.13,0,35); },
    coinPickup(){ tone(988,0.07,'square',0.13); tone(1318,0.09,'square',0.13,0.05); },
    towerPlace(){ tone(220,0.09,'square',0.16); noise(0.07,0.12,0,1500); },
    towerUpgrade(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.13,'triangle',0.14,i*0.06)); },
    towerMaxed(){ tone(220,0.16,'sawtooth',0.12); },
    uiClick(){ tone(440,0.05,'square',0.08); },
    heroAbility(){ tone(660,0.18,'sine',0.16,0,1000); noise(0.18,0.1,0,2400); },
    baseHit(){ noise(0.18,0.18,0,400); tone(110,0.18,'sine',0.15); },
    waveStart(){ [392,494,587].forEach((f,i)=>tone(f,0.14,'triangle',0.12,i*0.09)); },
    surgeWave(){ [220,220,220].forEach((f,i)=>tone(f,0.1,'sawtooth',0.17,i*0.12)); },
    levelWin(){ [523,659,784,1046,1318].forEach((f,i)=>tone(f,0.18,'triangle',0.15,i*0.1)); },
    gameOver(){ [392,349,294,220].forEach((f,i)=>tone(f,0.28,'sawtooth',0.14,i*0.16)); }
  };

  // ---- 背景音樂：輕快海盜風循環(貝斯+手風琴式撥奏)，以 lookahead 排程避免掉拍 ----
  const BPM = 100;
  const beatSec = 60/BPM;
  const rootFreq = 110; // A2
  const scale = [0,3,5,7,10,12,15,19]; // 小調五聲+變化音，營造海盜感
  const bassSeq = [0,0,5,5,3,3,7,4];
  function noteFreq(semi){ return rootFreq*Math.pow(2, semi/12); }
  function scheduleMusicNote(freq, t0, dur, type, vol){
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(musicGain);
    osc.start(t0); osc.stop(t0+dur+0.05);
  }
  function musicStep(){
    if(!ctx) return;
    while(nextNoteTime < ctx.currentTime + 0.4){
      const bassDeg = scale[bassSeq[beatIdx%bassSeq.length]%scale.length];
      scheduleMusicNote(noteFreq(bassDeg-12), nextNoteTime, beatSec*0.85, 'triangle', 0.075);
      if(beatIdx%2===1){
        const mDeg = scale[(beatIdx*3+((beatIdx*7)%5))%scale.length];
        scheduleMusicNote(noteFreq(mDeg+12), nextNoteTime+beatSec*0.5, beatSec*0.35, 'square', 0.035);
      }
      if(beatIdx%8===6){
        scheduleMusicNote(noteFreq(scale[6]+12), nextNoteTime, beatSec*0.3, 'triangle', 0.05);
      }
      nextNoteTime += beatSec;
      beatIdx++;
    }
  }
  function startMusic(){
    const c = ensureCtx();
    if(!c || musicStarted) return;
    musicStarted = true;
    nextNoteTime = c.currentTime + 0.15;
    beatIdx = 0;
    musicStep();
    musicHandle = setInterval(musicStep, 150);
  }
  function stopMusic(){
    musicStarted = false;
    if(musicHandle){ clearInterval(musicHandle); musicHandle=null; }
  }

  return { ensureCtx, setMuted, toggleMuted, isMuted, sfx, startMusic, stopMusic };
})();

// ============ 地圖系列(每10關一組主題) ============
const MAP_SERIES = [
  { name:'家鄉海域', sky:['#1b4f72','#2e6da4'], landA:'#8a5a34', landB:'#7a4d2b', seaA:'#1565c0', seaB:'#1976d2', boundary:'rgba(255,224,130,0.6)', wave:'rgba(255,255,255,0.18)' },
  { name:'迷霧礁岩', sky:['#37474f','#607d8b'], landA:'#5c5c52', landB:'#4f4f47', seaA:'#37474f', seaB:'#455a64', boundary:'rgba(207,216,220,0.55)', wave:'rgba(255,255,255,0.14)' },
  { name:'熔岩群島', sky:['#3e1a0f','#7a2e0e'], landA:'#4a2c1d', landB:'#3c2216', seaA:'#8d2b0b', seaB:'#a8380f', boundary:'rgba(255,171,64,0.6)', wave:'rgba(255,193,7,0.22)' },
  { name:'幽靈海域', sky:['#120f24','#241f3d'], landA:'#2e2b3d', landB:'#262336', seaA:'#1a2a4a', seaB:'#22315c', boundary:'rgba(179,157,219,0.6)', wave:'rgba(179,157,219,0.2)' }
];
function seriesIndexForLevel(n){ return clamp(Math.ceil(n/10)-1, 0, MAP_SERIES.length-1); }
function currentSeries(){ return MAP_SERIES[seriesIndexForLevel(G.level)]; }

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrapEl = document.getElementById('wrap');

function resizeCanvas(){
  const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
  wrapEl.classList.toggle('fs-mode', isFS);
  const hintEl = document.getElementById('hint');
  if(hintEl) hintEl.style.display = isFS ? 'none' : '';
  const fsBtnEl = document.getElementById('fsBtn');
  if(fsBtnEl) fsBtnEl.style.display = isFS ? 'none' : '';

  const availW = wrapEl.clientWidth || window.innerWidth;
  const reserveH = isFS ? 0 : 46;
  const availH = (wrapEl.clientHeight || window.innerHeight) - reserveH;

  GRID_Y = clamp(Math.round(availH * 0.115), 44, 92);
  SHOP_BAR_H = clamp(Math.round(availH * 0.19), 84, 132);
  let cellH = Math.floor((availH - GRID_Y - SHOP_BAR_H) / ROWS);
  if(cellH < 34){
    GRID_Y = 44; SHOP_BAR_H = 84;
    cellH = Math.floor((availH - GRID_Y - SHOP_BAR_H) / ROWS);
  }
  CELL_H = Math.max(30, cellH);
  CELL_W = Math.max(40, Math.floor((availW - GRID_X - RIGHT_MARGIN) / COLS));
  CANVAS_W = GRID_X + RIGHT_MARGIN + COLS*CELL_W;
  CANVAS_H = GRID_Y + ROWS*CELL_H + SHOP_BAR_H;

  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';

  spriteScale = clamp(CELL_H / 88, 0.55, 2.0);
}

function rand(a,b){ return a + Math.random()*(b-a); }
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

// ============ 關卡波次產生 ============
function weightedPick(pool, n){
  const w = { basic:5, fast:3, sword:3, heavy:1+Math.floor(n/3), archer:2+Math.floor(n/4), shield:2+Math.floor(n/5), diver:1+Math.floor(n/6), medic:1, flag:1+Math.floor(n/5), gunboat:1+Math.floor(n/6) };
  let total=0; const items=[];
  pool.forEach(t=>{ const wt=w[t]||1; total+=wt; items.push([t,wt]); });
  let r = Math.random()*total;
  for(const [t,wt] of items){ if(r<wt) return t; r-=wt; }
  return pool[0];
}
// 依運輸船的 cargoWeights 權重，挑選這一個艙位要卸下哪種載具
function pickCargoType(cargoWeights){
  let total=0; const items=[];
  for(const k in cargoWeights){ const wt=cargoWeights[k]; total+=wt; items.push([k,wt]); }
  let r = Math.random()*total;
  for(const [t,wt] of items){ if(r<wt) return t; r-=wt; }
  return items.length ? items[0][0] : 'basic';
}
function pickRowFor(type, terrain){
  if(type==='diver' || type==='medic' || type==='gunboat'){
    const seaRows=[];
    for(let r=0;r<ROWS;r++) if(terrain[r]>0) seaRows.push(r);
    if(seaRows.length) return seaRows[Math.floor(Math.random()*seaRows.length)];
  }
  return Math.floor(Math.random()*ROWS);
}

// ============ 地形產生 ============
function generateTerrain(level){
  const maxSea = clamp(2 + Math.floor((level-1)/2), 2, 5);
  const arr = [];
  for(let r=0;r<ROWS;r++){
    let sea = (Math.random() < 0.12) ? 0 : Math.floor(rand(1, maxSea+1));
    sea = clamp(sea, 0, COLS-4);
    arr.push(sea);
  }
  return arr;
}
function seaWidthOf(row){ return (G.terrain && G.terrain[row]) || 0; }
function landStartCol(row){ return COLS - seaWidthOf(row); }
function isSeaCell(row,col){ return col >= landStartCol(row); }
function seaBoundaryX(row){ return GRID_X + landStartCol(row)*CELL_W; }
// 陣地觀察：判斷這一列的動線是否安全(同列沒有我方砲塔可以阻擊)
function laneClear(row){ return !G.towers.some(t=>t.row===row); }

function buildLevel(n, terrain){
  const levelMult = 1 + (n-1)*0.16;
  const pools = {
    1:['basic'],
    2:['basic','fast'],
    3:['basic','fast','sword','archer'],
    4:['basic','fast','sword','heavy','archer'],
    5:['basic','fast','sword','heavy','archer','shield','flag'],
    6:['basic','fast','sword','heavy','archer','shield','flag']
  };
  let pool = pools[Math.min(n,6)] || ['basic','fast','sword','heavy','archer','shield','flag','diver','medic'];
  if(n>=7 && pool.indexOf('diver')===-1) pool = pool.concat(['diver','medic']);
  if(n>=7 && pool.indexOf('gunboat')===-1) pool = pool.concat(['gunboat']);
  const waveCount = 3 + Math.ceil(n/2);
  const waves = [];
  for(let w=0; w<waveCount; w++){
    const isSurge = w>0 && (w+1)%3===0; // 每3波一次猛攻波：數量短時間內爆量湧入
    const enemyCount = 4 + n + w + (isSurge ? Math.ceil(3+n/2) : 0);
    const events = [];
    let medicUsed = false;
    for(let i=0;i<enemyCount;i++){
      let type = weightedPick(pool, n);
      if(type==='medic'){
        if(medicUsed) type='basic'; else medicUsed = true;
      }
      const row = pickRowFor(type, terrain);
      let delay;
      if(i===0) delay = 0.6;
      else if(isSurge) delay = Math.max(0.18, rand(0.28,0.5) - Math.min(n*0.015,0.2));
      else delay = Math.max(0.35, rand(0.75,1.35) - Math.min(n*0.02,0.3));
      events.push({ delay, type, row });
    }
    waves.push({ events, levelMult, isSurge });
  }
  if(n % 5 === 0){
    const isMega40 = (n===40), isMega20 = (n===20 && !isMega40);
    const bossType = isMega40 ? 'megaboss40' : (isMega20 ? 'megaboss20' : 'boss');
    const events = [{ delay:1.2, type:bossType, row:2 }];
    for(let i=0;i<4;i++) events.push({ delay: rand(0.9,1.6), type:'sword', row: Math.floor(Math.random()*ROWS) });
    if(n===10) events.push({ delay:1.8, type:'boss', row: 4 });
    if(n===40) events.push({ delay:2.2, type:'boss', row: 4 });
    waves.push({ events, levelMult: levelMult*1.08 });
  }
  return waves;
}

function fxParticles(x,y,color,count,opts){
  opts = opts || {};
  const speedMin = opts.speedMin!==undefined?opts.speedMin:70;
  const speedMax = opts.speedMax!==undefined?opts.speedMax:230;
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = rand(speedMin, speedMax);
    const life = rand(0.28, 0.6);
    G.particles.push({
      x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - rand(0,50),
      life, maxLife: life, color, size: rand(2, opts.sizeMax||4.5)
    });
  }
}
function fxRing(x,y,maxR,color,life,width){
  G.rings.push({ x, y, r:0, maxR, life: life||0.4, maxLife: life||0.4, color, width: width||4 });
}
function fxShake(mag,dur){
  G.shake.mag = Math.max(G.shake.mag, mag);
  G.shake.time = Math.max(G.shake.time, dur||0.18);
}
function updateFx(dt){
  for(let i=G.particles.length-1;i>=0;i--){
    const p = G.particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 260*dt;
    p.life -= dt;
    if(p.life<=0) G.particles.splice(i,1);
  }
  for(let i=G.rings.length-1;i>=0;i--){
    const r = G.rings[i];
    r.life -= dt;
    const t = 1 - Math.max(0, r.life/r.maxLife);
    r.r = r.maxR * (1 - Math.pow(1-t, 3));
    if(r.life<=0) G.rings.splice(i,1);
  }
  if(G.shake.time>0){ G.shake.time = Math.max(0, G.shake.time-dt); if(G.shake.time===0) G.shake.mag=0; }
}
function drawFx(){
  ctx.save();
  for(const p of G.particles){
    const a = Math.max(0, p.life/p.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a+0.6, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for(const r of G.rings){
    const a = Math.max(0, r.life/r.maxLife);
    ctx.globalAlpha = a;
    ctx.strokeStyle = r.color; ctx.lineWidth = r.width*a+1;
    ctx.beginPath(); ctx.arc(r.x, r.y, Math.max(1,r.r), 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

// 從海上生成一艘船：一船可能載多名兵力(troopsPerShip)，船體血量加成三倍(SHIP_HP_BUFF)，
// 抵達灘頭時會依「船隻剩餘血量比例」決定實際能成功搶灘上岸的人數
function spawnEnemy(type, row, levelMult){
  const cfg = ENEMY_TYPES[type];
  const onShip = seaWidthOf(row) > 0;
  const e = makeEnemyBase(type, row, levelMult, GRID_X + COLS*CELL_W + 46);
  e.onShip = onShip;
  e.cargoWeights = cfg.cargoWeights || null;
  if(onShip){
    const shipHp = Math.round(e.hp * (cfg.shipMult||1.3) * SHIP_HP_BUFF);
    e.shipHp = shipHp;
    e.shipMaxHp = shipHp;
    e.troopsPerShip = cfg.troopsPerShip || TROOPS_PER_SHIP_DEFAULT;
    if(e.troopsPerShip > 1 && !/[船艦艇]$/.test(cfg.name)) e.name = cfg.name + '運兵船';
  } else {
    // 這一列沒有海域可搭船，直接以單一兵力出現在陸地上(不套用搶灘/船隻機制)
    e.shipHp = e.hp; e.shipMaxHp = e.hp; e.troopsPerShip = 1;
  }
  G.enemies.push(e);
}

// 船隻成功靠岸後，依存活比例散兵上岸；每個散兵都是獨立單位，會各自進入「架盾建立陣地」狀態
function spawnLandedTroop(type, row, levelMult, x){
  const e = makeEnemyBase(type, row, levelMult, x);
  e.onShip = false;
  e.shipHp = e.hp; e.shipMaxHp = e.hp; e.troopsPerShip = 1;
  e.state = 'rallying';
  e.rallyTimer = 0;
  e.laneScanCd = 0;
  G.enemies.push(e);
}

// ============ 傷害計算(護甲/護盾/潛水免疫) ============
function applyDamage(e, rawDmg, opts){
  opts = opts || {};
  if(e.onShip && e.submergeImmune && !opts.canHitSubmerged) return; // 潛水中，一般攻擊無效
  let dmg = rawDmg;
  if(e.state === 'rallying' && !opts.skipRallyDefense){
    if(Math.random() < RALLY_DODGE_CHANCE){
      spawnFloat(e.x, GRID_Y + e.row*CELL_H - 14, '閃避！', '#b3e5fc');
      return;
    }
    dmg *= (1 - RALLY_DEFENSE_MULT);
  }
  const effArmor = Math.max(0, (e.armor||0) - (e.curseTimer>0 ? (e.curseArmorRed||0) : 0));
  if(effArmor && !opts.ignoreArmor) dmg *= (1 - effArmor);
  if(e.onShip){ e.shipHp -= dmg; return; }
  if(e.shield > 0){
    const mult = opts.bypassDeflect ? (opts.shieldMult||1) : 0.3;
    const dealt = dmg*mult;
    e.shield -= dealt;
    if(e.shield < 0){ e.hp += e.shield; e.shield = 0; }
  } else {
    e.hp -= dmg;
  }
}

// ============ 更新邏輯：波次 ============
function updateWaves(dt){
  if(G.levelComplete || G.gameOver) return;
  if(G.waveIdx === -1){
    G.prepTimer -= dt;
    if(G.prepTimer <= 0) startNextWave();
    return;
  }
  if(G.spawning){
    if(G.spawnIdx < G.currentEvents.length){
      G.spawnCountdown -= dt;
      if(G.spawnCountdown <= 0){
        const ev = G.currentEvents[G.spawnIdx];
        spawnEnemy(ev.type, ev.row, G.currentLevelMult);
        G.spawnIdx++;
        if(G.spawnIdx < G.currentEvents.length) G.spawnCountdown = G.currentEvents[G.spawnIdx].delay;
      }
    } else {
      G.spawning = false;
    }
    return;
  }
  if(G.enemies.length === 0){
    if(G.waveIdx+1 < G.waves.length){
      if(G.betweenTimer === undefined) G.betweenTimer = 5.5;
      G.betweenTimer -= dt;
      if(G.betweenTimer <= 0){ G.betweenTimer = undefined; startNextWave(); }
    } else {
      finishLevelWin();
    }
  }
}

// ============ 索敵(扇形範圍) ============
function findCandidates(t, cfg){
  const c = cellCenter(t.row,t.col);
  const halfAngle = (cfg.angle/2) * Math.PI/180;
  const list = [];
  for(const e of G.enemies){
    const dx = e.x - c.x, dy = (e.row - t.row) * CELL_H;
    if(dx < -24) continue;
    const dist = Math.hypot(dx,dy);
    if(dist > cfg.range) continue;
    const ang = Math.atan2(Math.abs(dy), Math.max(dx, 0.0001));
    if(ang > halfAngle) continue;
    list.push({ e, dist });
  }
  list.sort((a,b)=>a.dist-b.dist);
  const medicIdx = list.findIndex(o=>o.e.type==='medic');
  if(medicIdx > 0){ const [m] = list.splice(medicIdx,1); list.unshift(m); }
  return list.map(o=>o.e);
}

function fireTower(t, cfg, candidates){
  const c = cellCenter(t.row,t.col);
  if(cfg.pierce){
    let mult = 1;
    const hits = [];
    for(const e of candidates){
      applyDamage(e, cfg.dmg*mult, { canHitSubmerged:false });
      hits.push({ x:e.x, row:e.row });
      mult *= cfg.pierceDecay;
    }
    G.projectiles.push({ beam:true, life:0.16, fromX:c.x, fromY:c.y, hits, color: branchColor(cfg.branch) });
    t.cooldown = cfg.cd;
    AudioSys.sfx.sniperShoot();
    return;
  }
  const target = candidates[0];
  const dx = target.x - c.x, dy = (target.row - t.row) * CELL_H;
  G.projectiles.push({ x:c.x, y:c.y, targetRef:target, nodeKey:t.key, speed: cfg.pspeed||560, angle: Math.atan2(dy,dx), branch: cfg.branch });
  t.cooldown = cfg.cd;
  if(cfg.splash>0) AudioSys.sfx.splashShoot();
  else if(cfg.branch==='C') AudioSys.sfx.freezeShoot();
  else if(!cfg.range || cfg.range===Infinity ? (cfg.pspeed||560)>=900 : false) AudioSys.sfx.sniperShoot();
  else AudioSys.sfx.shoot();
}

function updateTowers(dt){
  for(const e of G.enemies) e.auraSlowFactor = 1;
  for(const t of G.towers){
    if(t.disabledTimer > 0){ t.disabledTimer = Math.max(0, t.disabledTimer-dt); continue; }
    const cfg = NODES[t.key];
    if(cfg.aura){
      const c = cellCenter(t.row,t.col);
      const halfAngle = (cfg.angle/2)*Math.PI/180;
      for(const e of G.enemies){
        const dx = e.x - c.x, dy = (e.row - t.row)*CELL_H;
        if(dx < -24) continue;
        const dist = Math.hypot(dx,dy);
        if(dist > cfg.range) continue;
        const ang = Math.atan2(Math.abs(dy), Math.max(dx,0.0001));
        if(ang > halfAngle) continue;
        e.auraSlowFactor = Math.min(e.auraSlowFactor, 1-cfg.aura.slowPct);
      }
      continue;
    }
    t.cooldown -= dt;
    if(t.cooldown <= 0){
      const candidates = findCandidates(t, cfg);
      if(candidates.length) fireTower(t, cfg, candidates);
    }
  }
}

function onProjectileImpact(p){
  const target = p.targetRef;
  if(!G.enemies.includes(target)) return;
  const cfg = NODES[p.nodeKey];
  const opts = {};
  if(cfg.shieldBonus){ opts.bypassDeflect = true; opts.shieldMult = cfg.shieldBonus; }
  opts.canHitSubmerged = (cfg.splash>0) || cfg.branch==='C';
  applyDamage(target, cfg.dmg, opts);
  AudioSys.sfx.hitImpact();
  if(cfg.slowPct){
    target.tempSlowFactor = Math.min(target.tempSlowFactor, 1-cfg.slowPct);
    target.tempSlowTimer = Math.max(target.tempSlowTimer, cfg.slowDur||1.5);
  }
  if(cfg.dot) target.dot = { dps:cfg.dot.dps, remaining:cfg.dot.dur };
  if(cfg.freezeDur) target.frozenTimer = Math.max(target.frozenTimer, cfg.freezeDur);
  if(cfg.chain){
    let count=0;
    for(const e2 of G.enemies){
      if(count>=cfg.chain) break;
      if(e2===target) continue;
      const dx=e2.x-target.x, dy=(e2.row-target.row)*CELL_H;
      if(Math.hypot(dx,dy) <= 90){ e2.frozenTimer = Math.max(e2.frozenTimer, cfg.freezeDur*0.6); count++; }
    }
  }
  if(cfg.splash > 0){
    for(const e2 of G.enemies){
      if(e2===target) continue;
      const dx=e2.x-target.x, dy=(e2.row-target.row)*CELL_H;
      if(Math.hypot(dx,dy) <= cfg.splash){
        applyDamage(e2, cfg.dmg*cfg.splashMult, { canHitSubmerged:true });
        if(cfg.dot) e2.dot = { dps:cfg.dot.dps*0.7, remaining:cfg.dot.dur };
      }
    }
  }
}

function updateProjectiles(dt){
  for(let i=G.projectiles.length-1;i>=0;i--){
    const p = G.projectiles[i];
    if(p.beam){ p.life -= dt; if(p.life<=0) G.projectiles.splice(i,1); continue; }
    if(!G.enemies.includes(p.targetRef)){ G.projectiles.splice(i,1); continue; }
    const ty = GRID_Y + p.targetRef.row*CELL_H + CELL_H/2;
    const dx = p.targetRef.x - p.x, dy = ty - p.y;
    const dist = Math.hypot(dx,dy);
    const step = p.speed*dt;
    if(dist <= step){
      onProjectileImpact(p);
      G.projectiles.splice(i,1);
    } else {
      p.angle = Math.atan2(dy,dx);
      p.x += dx/dist*step;
      p.y += dy/dist*step;
    }
  }
}

function resolveShipSunk(e, i){
  const totalTroops = e.troopsPerShip || 1;
  const sinkGold = Math.max(1, Math.round(e.gold * totalTroops * 0.4));
  G.gold += sinkGold;
  spawnFloat(e.x, GRID_Y + e.row*CELL_H + 20, '+'+sinkGold+' 擊沉！', '#80d8ff');
  AudioSys.sfx.shipSink();

  let survivors = 0;
  for(let k=0;k<totalTroops;k++){ if(Math.random() >= e.drownChance) survivors++; }
  const drowned = totalTroops - survivors;

  G.enemies.splice(i,1);
  for(let k=0;k<drowned;k++) registerKill();

  if(survivors <= 0){
    spawnFloat(e.x, GRID_Y + e.row*CELL_H - 12, totalTroops>1 ? '船員全數溺水身亡！' : '海盜溺水身亡！', '#4fc3f7');
    return;
  }
  spawnFloat(e.x, GRID_Y + e.row*CELL_H - 12, totalTroops>1 ? `${survivors}/${totalTroops} 泅水上岸！` : '泅水上岸！', '#fff59d');
  for(let k=0;k<survivors;k++){
    const cargoType = e.cargoWeights ? pickCargoType(e.cargoWeights) : e.type;
    const t = makeEnemyBase(cargoType, e.row, e.levelMult, e.x - k*18);
    t.onShip = false;
    t.shipHp = t.hp; t.shipMaxHp = t.hp; t.troopsPerShip = 1;
    t.state = 'walking'; // 船已經沉了，剩下的人得自己游/走上岸，沒有陣地可躲
    G.enemies.push(t);
  }
}

// 衝鋒buff / 指揮官buff / 詛咒印記 加成後的實際傷害
function effectiveDmg(e){
  return e.dmg * (e.chargeActive ? CHARGE_DMG_MULT : 1) * (e.cmdDmgMul || 1) * (e.curseTimer>0 ? (e.curseDmgMult||1) : 1);
}

// 指揮官(掌旗官)光環：每幀重新計算一次，多個指揮官取最高加成
function updateCommanderAuras(){
  for(const e of G.enemies){ e.cmdSpeedMul = 1; e.cmdDmgMul = 1; }
  for(const f of G.enemies){
    if(!f.auraBuff) continue;
    for(const o of G.enemies){
      const dx = o.x - f.x, dy = (o.row - f.row) * CELL_H;
      if(Math.hypot(dx,dy) <= f.auraBuff.radius){
        o.cmdSpeedMul = Math.max(o.cmdSpeedMul, f.auraBuff.speedMult);
        o.cmdDmgMul = Math.max(o.cmdDmgMul, f.auraBuff.dmgMult);
      }
    }
  }
}

function updateEnemies(dt){
  updateCommanderAuras();
  for(let i=G.enemies.length-1;i>=0;i--){
    const e = G.enemies[i];

    if(e.frozenTimer>0) e.frozenTimer = Math.max(0, e.frozenTimer-dt);
    if(e.tempSlowTimer>0){ e.tempSlowTimer -= dt; if(e.tempSlowTimer<=0) e.tempSlowFactor = 1; }
    if(e.chargeActive){ e.chargeTimer -= dt; if(e.chargeTimer<=0) e.chargeActive = false; }
    if(e.curseTimer>0){ e.curseTimer = Math.max(0, e.curseTimer-dt); if(e.curseTimer<=0){ e.curseDmgMult=1; e.curseArmorRed=0; } }
    if(e.dot){
      applyDamage(e, e.dot.dps*dt, { canHitSubmerged:true, skipRallyDefense:true });
      e.dot.remaining -= dt;
      if(e.dot.remaining<=0) e.dot = null;
    }
    const frozen = e.frozenTimer>0;
    const speedMul = frozen ? 0 : Math.min(e.auraSlowFactor, e.tempSlowFactor) * (e.chargeActive?CHARGE_SPEED_MULT:1) * (e.cmdSpeedMul||1);

    // 醫療船：不上陸，靠岸後原地治療
    if(e.noLand){
      if(e.state!=='camping'){
        if(e.onShip && e.x <= seaBoundaryX(e.row)+2){
          e.state = 'camping';
          e.x = seaBoundaryX(e.row)+18;
        } else if(!frozen){
          e.x -= e.speed*speedMul*dt;
        }
      }
      for(const o of G.enemies){
        if(o===e || !o.onShip) continue;
        const dx=o.x-e.x, dy=(o.row-e.row)*CELL_H;
        if(Math.hypot(dx,dy) <= (e.healRadius||150)){
          o.shipHp = Math.min(o.shipMaxHp, o.shipHp + o.shipMaxHp*(e.healPct||0.03)*dt);
        }
      }
      if(e.onShip && e.shipHp<=0){
        const g = Math.max(1, Math.round(e.gold*0.6));
        G.gold += g;
        spawnFloat(e.x, GRID_Y+e.row*CELL_H+20, '+'+g+' 醫療船擊沉！', '#80d8ff');
        G.enemies.splice(i,1);
        registerKill();
      }
      continue;
    }

    // 搶灘登陸：船靠岸了，依「船隻剩餘血量比例」決定這船能成功上岸幾人，
    // 每個上岸的散兵都是獨立單位，各自進入「架盾建立陣地」狀態
    if(e.state==='walking' && e.onShip && e.x <= seaBoundaryX(e.row) && seaWidthOf(e.row) > 0){
      const landX = seaBoundaryX(e.row);
      if(e.troopsPerShip > 1){
        const hpFrac = clamp(e.shipHp / e.shipMaxHp, 0, 1);
        let survivors = Math.round(e.troopsPerShip * hpFrac);
        if(survivors <= 0 && e.shipHp > 0) survivors = 1; // 船沒沉，至少有人搶灘成功
        survivors = clamp(survivors, 0, e.troopsPerShip);
        for(let k=0;k<survivors;k++){
          const cargoType = e.cargoWeights ? pickCargoType(e.cargoWeights) : e.type;
          spawnLandedTroop(cargoType, e.row, e.levelMult, landX - k*22);
        }
        const lost = e.troopsPerShip - survivors;
        if(survivors <= 0){
          spawnFloat(landX, GRID_Y+e.row*CELL_H-14, '搶灘失敗，全員陣亡！', '#ff5252');
        } else if(lost > 0){
          spawnFloat(landX, GRID_Y+e.row*CELL_H-14, `搶灘：${survivors}/${e.troopsPerShip} 人上岸`, '#ff8a65');
        } else {
          spawnFloat(landX, GRID_Y+e.row*CELL_H-14, `搶灘：${survivors}/${e.troopsPerShip} 全員上岸！`, '#ffd54f');
        }
        G.enemies.splice(i,1);
        continue;
      }
      e.onShip = false;
      e.state = 'rallying';
      e.rallyTimer = 0;
      e.laneScanCd = 0;
      e.attackingTower = null;
    }

    // 架盾陣地：固守原地(享有架盾減傷/閃避)，有遠程能力者對砲塔開火壓制；
    // 每隔一段時間評估同列動線是否安全，安全才會下令全隊衝鋒(人數壓倒性優勢或等太久則為保底)
    if(e.state === 'rallying'){
      e.rallyTimer += dt;

      // 陣地對轟：鎖定同列射程內最近的砲塔開火(仍保有架盾姿態與減傷)
      if(e.ranged && !frozen){
        const rowTowers = G.towers.filter(t=>t.row===e.row);
        let nearest=null, nd=Infinity;
        for(const t of rowTowers){
          const d = e.x - (GRID_X+t.col*CELL_W+CELL_W);
          if(d < 0) continue;
          if(d<nd){ nd=d; nearest=t; }
        }
        if(nearest && nd <= e.atkRange){
          e.attackingTower = nearest;
          e.atkCd -= dt;
          if(e.atkCd<=0){
            nearest.hp -= effectiveDmg(e);
            e.atkCd = e.atkInterval;
            if(nearest.hp<=0){ removeTower(nearest); e.attackingTower=null; }
          }
        } else {
          e.attackingTower = null;
        }
      }

      // 陣地觀察：定期偵查同列動線是否已淨空
      e.laneScanCd -= dt;
      if(e.laneScanCd <= 0){
        e.laneScanCd = LANE_SCAN_INTERVAL;
        let nearby = 0;
        for(const o of G.enemies){
          if(o===e || o.state!=='rallying') continue;
          if(Math.abs(o.row-e.row) > 1) continue;
          if(Math.abs(o.x-e.x) > RALLY_RADIUS) continue;
          nearby++;
        }
        const safe = laneClear(e.row);
        const massOverride = (nearby+1) >= RALLY_CRITICAL_MASS;
        const timeoutOverride = e.rallyTimer >= RALLY_MAX_WAIT;
        if(safe || massOverride || timeoutOverride){
          for(const o of G.enemies){
            if(o.state!=='rallying') continue;
            if(Math.abs(o.row-e.row) > 1) continue;
            if(Math.abs(o.x-e.x) > RALLY_RADIUS) continue;
            o.state = 'walking';
            o.attackingTower = null;
            o.chargeActive = true;
            o.chargeTimer = CHARGE_DURATION;
          }
          spawnFloat(e.x, GRID_Y+e.row*CELL_H-14, safe ? '⚡動線安全，衝鋒！' : '⚡衝鋒！', '#ffab40');
        }
      }
    }

    // 遠程弓箭手：站在射程內原地攻擊，不需貼身(集結中不搶跑)
    if(e.ranged && e.state!=='attacking' && e.state!=='rallying'){
      const rowTowers = G.towers.filter(t=>t.row===e.row && (GRID_X+t.col*CELL_W) < e.x);
      let nearest=null, nd=Infinity;
      for(const t of rowTowers){
        const d = e.x - (GRID_X+t.col*CELL_W+CELL_W);
        if(d<nd){ nd=d; nearest=t; }
      }
      if(nearest && nd <= e.atkRange){ e.state='ranged'; e.attackingTower=nearest; }
      else if(e.state==='ranged'){ e.state='walking'; e.attackingTower=null; }
    }

    if(e.state === 'ranged'){
      if(!e.attackingTower || !G.towers.includes(e.attackingTower)){
        e.state='walking'; e.attackingTower=null;
      } else if(!frozen){
        e.atkCd -= dt;
        if(e.atkCd<=0){
          e.attackingTower.hp -= effectiveDmg(e);
          e.atkCd = e.atkInterval;
          if(e.attackingTower.hp<=0){ removeTower(e.attackingTower); e.state='walking'; e.attackingTower=null; }
        }
      }
    } else if(e.state === 'attacking'){
      if(!e.attackingTower || !G.towers.includes(e.attackingTower)){
        e.state = 'walking'; e.attackingTower = null;
      } else if(!frozen){
        e.attackingTower.hp -= effectiveDmg(e)*dt;
        if(e.attackingTower.hp <= 0){
          removeTower(e.attackingTower);
          e.state = 'walking'; e.attackingTower = null;
        }
      }
    }

    if(e.state === 'walking' && !frozen){
      const curSpeed = (!e.onShip && e.landSpeed) ? e.landSpeed : e.speed;
      const nextX = e.x - curSpeed*speedMul*dt;
      const rowTowers = G.towers.filter(t=>t.row===e.row);
      let blocked = null;
      for(const t of rowTowers){
        const left = GRID_X + t.col*CELL_W, right = left + CELL_W;
        if(e.x <= right + ENGAGE_EPS && e.x >= left){ blocked = t; break; }
        if(nextX <= right && e.x > right){ blocked = t; break; }
      }
      if(blocked){
        const queueAhead = G.enemies.filter(o => o!==e && o.row===e.row && o.attackingTower===blocked && o.state==='attacking').length;
        e.x = GRID_X + blocked.col*CELL_W + CELL_W + queueAhead*Math.max(26, CELL_W*0.34);
        e.state = 'attacking'; e.attackingTower = blocked;
      } else {
        e.x = nextX;
        if(e.x <= GRID_X){
          let dmgToBase = effectiveDmg(e)*1.8;
          if(G.wallInvulnTimer>0) dmgToBase = 0;
          else if(G.wallShieldTimer>0) dmgToBase *= (1-G.wallShieldPct);
          G.baseHP = clamp(G.baseHP - dmgToBase, 0, G.baseMaxHP);
          if(dmgToBase>0) AudioSys.sfx.baseHit();
          G.enemies.splice(i,1);
          continue;
        }
      }
    }

    if(e.onShip){
      if(e.shipHp <= 0){ resolveShipSunk(e, i); continue; }
    } else if(e.hp <= 0){
      G.gold += e.gold;
      spawnFloat(e.x, GRID_Y + e.row*CELL_H + 20, '+'+e.gold, '#ffd54f');
      if(e.deathSpawnCount>0 && e.deathSpawnType){
        for(let k=0;k<e.deathSpawnCount;k++){
          spawnLandedTroop(e.deathSpawnType, e.row, e.levelMult, e.x - (k+1)*20);
        }
        spawnFloat(e.x, GRID_Y+e.row*CELL_H-14, '車體炸開，散兵突圍！', '#ff8a65');
      }
      G.enemies.splice(i,1);
      registerKill();
      AudioSys.sfx.enemyDeath();
      continue;
    }

    if(e.isBossTier){
      const ratio = e.onShip ? e.shipHp/e.shipMaxHp : e.hp/e.maxHp;
      e.rageThresholds.forEach((th,idx)=>{
        if(!e.rageDone[idx] && ratio<=th){
          e.rageDone[idx] = true;
          e.speed*=1.4; e.landSpeed*=1.4; e.dmg = Math.round(e.dmg*1.3*10)/10;
          spawnFloat(e.x, GRID_Y+e.row*CELL_H-20, '狂暴！', '#ff5252');
        }
      });
      e.summonThresholds.forEach((th,idx)=>{
        if(!e.summonDone[idx] && ratio<=th){
          e.summonDone[idx] = true;
          e.summonTypes.forEach(st=>{ spawnEnemy(st, e.row, G.currentLevelMult); });
          spawnFloat(e.x, GRID_Y+e.row*CELL_H-20, '召喚支援！', '#ba68c8');
        }
      });
      if(e.abilityInterval>0 && !frozen){
        e.abilityCd -= dt;
        if(e.abilityCd<=0){
          e.abilityCd = e.abilityInterval;
          let targets = [];
          if(e.abilityScope==='wide'){
            targets = G.towers.filter(t=>Math.abs(t.row-e.row)<=1);
          } else {
            const rowTowers = G.towers.filter(t=>t.row===e.row);
            let nearest=null, nd=Infinity;
            for(const t of rowTowers){
              const d = Math.abs(e.x-(GRID_X+t.col*CELL_W+CELL_W/2));
              if(d<nd){ nd=d; nearest=t; }
            }
            if(nearest) targets=[nearest];
          }
          if(targets.length){
            targets.forEach(t=>{ t.disabledTimer = Math.max(t.disabledTimer||0, e.abilityDisableDuration); });
            spawnFloat(e.x, GRID_Y+e.row*CELL_H-34, e.abilityScope==='wide' ? '⚡艦隊齊射壓制！' : '🎵魅惑光束！', '#ce93d8');
          }
        }
      }
    }
  }
  if(G.baseHP <= 0 && !G.gameOver){ G.gameOver = true; AudioSys.sfx.gameOver(); }
}

function updateCoins(dt){
  G.coinTimer -= dt;
  if(G.coinTimer <= 0){
    G.coinTimer = rand(5.5, 9);
    G.coins.push({
      x: rand(GRID_X+40, GRID_X+COLS*CELL_W-40),
      y: GRID_Y - 30,
      vy: rand(28,42),
      life: 6.5,
      value: Math.round(rand(15,32))
    });
  }
  for(let i=G.coins.length-1;i>=0;i--){
    const c = G.coins[i];
    c.y += c.vy*dt;
    c.life -= dt;
    if(c.life <= 0 || c.y > GRID_Y + ROWS*CELL_H) G.coins.splice(i,1);
  }
}

function updateFloats(dt){
  for(let i=G.floats.length-1;i>=0;i--){
    const f = G.floats[i];
    f.y += f.vy*dt; f.life -= dt;
    if(f.life<=0) G.floats.splice(i,1);
  }
  for(let i=G.heroFlashes.length-1;i>=0;i--){
    G.heroFlashes[i].life -= dt;
    if(G.heroFlashes[i].life<=0) G.heroFlashes.splice(i,1);
  }
}

function update(dt){
  if(G.screen !== 'playing' || G.paused || G.gameOver || G.levelComplete || G.pendingMerge || G.pendingHeroClass || G.showHeroShop) return;
  const sdt = dt * G.speedMul;
  updateWaves(sdt);
  updateTowers(sdt);
  updateProjectiles(sdt);
  updateEnemies(sdt);
  updateHero(sdt);
  updateCoins(sdt);
  updateFloats(sdt);
  updateFx(sdt);
}

// ============ 英雄(城牆主角)系統邏輯 ============
function heroPos(){ return { x: GRID_X - 20, y: GRID_Y + ROWS*CELL_H/2 }; }

function registerKill(){
  const h = G.hero;
  h.kills++;
  while(h.level-1 < KILL_THRESHOLDS.length && h.kills >= KILL_THRESHOLDS[h.level-1]){
    h.level++;
    const pos = heroPos();
    spawnFloat(pos.x, pos.y-50, '英雄升級！Lv.'+h.level, '#ffd54f');
    if(h.level===5 && !h.baseClass){ G.pendingHeroClass = 'base'; }
    if(h.level===10 && h.baseClass && !h.finalClass){ G.pendingHeroClass = 'final'; }
  }
}

function updateHero(dt){
  const h = G.hero;
  if(G.wallShieldTimer>0) G.wallShieldTimer = Math.max(0, G.wallShieldTimer-dt);
  if(G.wallInvulnTimer>0) G.wallInvulnTimer = Math.max(0, G.wallInvulnTimer-dt);
  if(h.abilityCd.a>0) h.abilityCd.a = Math.max(0, h.abilityCd.a-dt);
  if(h.abilityCd.b>0) h.abilityCd.b = Math.max(0, h.abilityCd.b-dt);
  if(h.rageTimer>0){ h.rageTimer -= dt; if(h.rageTimer<=0){ h.rageTimer=0; h.rageMult=1; h.rageIgnoreArmor=false; } }
  h.atkCd -= dt;
  if(h.atkCd>0) return;
  const familyKey = h.baseClass || 'recruit';
  const stats = HERO_FAMILY_STATS[familyKey] || HERO_FAMILY_STATS.recruit;
  const pos = heroPos();
  const lvlMul = 1 + (h.level-1)*0.05;
  let best=null, bestDist=Infinity;
  for(const e of G.enemies){
    const dx = e.x-pos.x, dy = (GRID_Y+e.row*CELL_H+CELL_H/2)-pos.y;
    if(dx < -30) continue;
    const dist = Math.hypot(dx,dy);
    if(dist>stats.range) continue;
    if(dist<bestDist){ bestDist=dist; best=e; }
  }
  if(!best){ h.atkCd = 0.15; return; }
  const dmg = stats.dmg*lvlMul*(h.rageMult||1);
  const opts = { ignoreArmor: !!h.rageIgnoreArmor };
  applyDamage(best, dmg, opts);
  if(stats.splash>0){
    for(const e2 of G.enemies){
      if(e2===best) continue;
      const dx=e2.x-best.x, dy=(e2.row-best.row)*CELL_H;
      if(Math.hypot(dx,dy)<=stats.splash) applyDamage(e2, dmg*0.5, opts);
    }
  }
  if(familyKey==='mage'){ best.dot = { dps: dmg*0.35, remaining:2 }; }
  G.heroFlashes.push({ x:best.x, y:GRID_Y+best.row*CELL_H+CELL_H/2, life:0.22 });
  h.atkCd = stats.cd / (h.rageMult||1);
}

function castAbility(slot){
  const h = G.hero;
  const activeClass = h.finalClass || h.baseClass;
  if(!activeClass) return;

// ============ 繪圖：背景 ============
function drawBackground(){
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  const series = currentSeries();
  const sky = ctx.createLinearGradient(0,0,0,GRID_Y);
  sky.addColorStop(0,series.sky[0]); sky.addColorStop(1,series.sky[1]);
  ctx.fillStyle = sky; ctx.fillRect(0,0,CANVAS_W,GRID_Y);
  const t = Date.now()/500;
  for(let r=0;r<ROWS;r++){
    const seaW = seaWidthOf(r);
    for(let c=0;c<COLS;c++){
      const x=GRID_X+c*CELL_W, y=GRID_Y+r*CELL_H;
      if(isSeaCell(r,c)){
        ctx.fillStyle = (r+c)%2===0 ? series.seaA : series.seaB;
        ctx.fillRect(x,y,CELL_W,CELL_H);
        ctx.strokeStyle=series.wave; ctx.lineWidth=1.4;
        for(let wy=12; wy<CELL_H; wy+=18){
          ctx.beginPath();
          for(let wx=0; wx<=CELL_W; wx+=8){
            const yy = y+wy+Math.sin((wx+x)/14 + t)*2.2;
            if(wx===0) ctx.moveTo(x+wx,yy); else ctx.lineTo(x+wx,yy);
          }
          ctx.stroke();
        }
      } else {
        ctx.fillStyle = (r+c)%2===0 ? series.landA : series.landB;
        ctx.fillRect(x,y,CELL_W,CELL_H);
      }
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.strokeRect(x,y,CELL_W,CELL_H);
    }
    if(seaW>0 && seaW<COLS){
      const bx = seaBoundaryX(r);
      ctx.fillStyle=series.boundary;
      ctx.fillRect(bx-4, GRID_Y+r*CELL_H, 8, CELL_H);
    }
  }
  drawWall();
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for(let r=0;r<ROWS;r++) ctx.fillRect(GRID_X, GRID_Y+r*CELL_H+CELL_H-3, COLS*CELL_W, 3);
}

function drawWall(){
  const wallW = WALL_W;
  const wx = GRID_X - wallW;
  const wallH = ROWS*CELL_H;
  const grad = ctx.createLinearGradient(wx,0,wx+wallW,0);
  grad.addColorStop(0,'#4e4640'); grad.addColorStop(1,'#6b6058');
  ctx.fillStyle = grad;
  ctx.fillRect(wx, GRID_Y, wallW, wallH);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth=1;
  const brickH=14;
  for(let y=GRID_Y; y<GRID_Y+wallH; y+=brickH){
    ctx.beginPath(); ctx.moveTo(wx,y); ctx.lineTo(wx+wallW,y); ctx.stroke();
    const offset = (((y-GRID_Y)/brickH)|0)%2===0 ? 0 : wallW/2;
    ctx.beginPath(); ctx.moveTo(wx+offset, y); ctx.lineTo(wx+offset, Math.min(y+brickH,GRID_Y+wallH)); ctx.stroke();
  }
  ctx.fillStyle = '#5c534b';
  const merlonW = 12, gapW=10, merlonH=14;
  for(let x=wx; x<wx+wallW; x+=merlonW+gapW){
    ctx.fillRect(x, GRID_Y-merlonH, Math.min(merlonW,wx+wallW-x), merlonH);
  }
  ctx.font='16px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🔥', wx+wallW/2, GRID_Y+26);
  ctx.fillText('🔥', wx+wallW/2, GRID_Y+wallH-16);
  if(G.wallShieldTimer>0){
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.fillStyle='#4fc3f7'; ctx.fillRect(wx,GRID_Y,wallW,wallH);
    ctx.restore();
  }
  if(G.wallInvulnTimer>0){
    ctx.save(); ctx.globalAlpha=0.4+Math.sin(Date.now()/100)*0.15;
    ctx.fillStyle='#ffd54f'; ctx.fillRect(wx,GRID_Y,wallW,wallH);
    ctx.restore();
  }
}

function drawHero(){
  const h = G.hero;
  const pos = heroPos();
  const classKey = h.finalClass || h.baseClass || 'recruit';
  const info = HERO_TREE[classKey] || HERO_TREE.recruit;
  const bob = Math.sin(Date.now()/260)*3;
  ctx.save();
  ctx.translate(pos.x, pos.y+bob);
  if(h.rageTimer>0){
    ctx.beginPath(); ctx.arc(0,-4,30,0,Math.PI*2);
    ctx.fillStyle='rgba(255,23,68,0.28)'; ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(0,30,16,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();

  ctx.beginPath(); ctx.ellipse(-2,10,11,17,0.05,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2b2b2b';
  ctx.fillRect(-8,14,16,14);
  ctx.fillStyle = '#e0a978';
  ctx.beginPath(); ctx.arc(0,-8,10,0,Math.PI*2); ctx.fill();
  ctx.font='22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(info.emoji, 14, -2);
  ctx.font='bold 11px sans-serif';
  ctx.fillStyle='#ffd54f'; ctx.beginPath(); ctx.arc(-16,-20,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3e2723'; ctx.fillText('Lv'+h.level, -16, -19);
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText(info.name, pos.x, pos.y+48);
}

function drawHeroFlashes(){
  for(const f of G.heroFlashes){
    ctx.save();
    ctx.globalAlpha = Math.max(0, f.life/0.22);
    ctx.beginPath(); ctx.arc(f.x, f.y, 16*(1-f.life/0.22)+6, 0, Math.PI*2);
    ctx.strokeStyle='#ffe082'; ctx.lineWidth=3; ctx.stroke();
    ctx.restore();
  }
}

function drawHUD(){
  const s = clamp(GRID_Y/90, 0.6, 1.25);
  const barH0 = GRID_Y - Math.round(10*s);
  ctx.fillStyle = '#20344a';
  ctx.fillRect(0,0,CANVAS_W,barH0);
  ctx.fillStyle = '#0e2a44';
  ctx.fillRect(0,barH0,CANVAS_W,GRID_Y-barH0);

  const midY = barH0/2;

  ctx.font = Math.round(32*s)+'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('💰', 16, midY);
  ctx.fillStyle = '#ffd54f'; ctx.font = 'bold ' + Math.round(29*s) + 'px sans-serif';
  ctx.fillText(Math.floor(G.gold), 16 + Math.round(38*s), midY);

  ctx.fillStyle = '#eaf2fb'; ctx.font = 'bold ' + Math.round(23*s) + 'px sans-serif'; ctx.textAlign='center';
  ctx.fillText('第 ' + G.level + ' 關 · ' + currentSeries().name, CANVAS_W/2, midY - Math.round(14*s));
  ctx.font = 'bold ' + Math.round(17*s)+'px sans-serif'; ctx.fillStyle = '#c7ddf5';
  let waveText;
  if(G.levelComplete) waveText = '關卡完成！';
  else if(G.gameOver) waveText = '防線失守...';
  else if(G.waveIdx === -1) waveText = '準備中 ' + Math.ceil(G.prepTimer) + '...';
  else if(G.spawning || G.enemies.length>0) waveText = '第 ' + (G.waveIdx+1) + ' / ' + G.waves.length + ' 波' + (G.currentIsSurge?' ⚠️猛攻':'');
  else waveText = '下一波倒數 ' + Math.ceil(G.betweenTimer||0);
  ctx.fillText(waveText, CANVAS_W/2, midY + Math.round(14*s));

  // 暫停／選單／加速／堡壘耐久度 已移到下方按鈕列(手機雙指分工用)，
  // 這裡空出來的右側改放英雄狀態(等級/職業/累積擊殺)，純資訊、不需點擊，放大加強存在感。
  const classInfo = HERO_TREE[G.hero.finalClass||G.hero.baseClass||'recruit'];
  ctx.textAlign='right';
  ctx.fillStyle='#ffd54f'; ctx.font='bold '+Math.round(20*s)+'px sans-serif';
  ctx.fillText(classInfo.emoji+' Lv.'+G.hero.level+' '+classInfo.name, CANVAS_W-16, midY-Math.round(12*s));
  ctx.fillStyle='#c7ddf5'; ctx.font='bold '+Math.round(15*s)+'px sans-serif';
  ctx.fillText('累積擊殺 '+G.hero.kills, CANVAS_W-16, midY+Math.round(12*s));
}

function drawButton(x,y,w,h,label,bg,fontSize){
  ctx.fillStyle = bg || '#455a64';
  roundRect(x,y,w,h,8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (fontSize||18) + 'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, x+w/2, y+h/2+1);
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ============ 扇形攻擊範圍預覽 ============
function drawFan(center, cfg, colorOverride){
  const halfAngle = (cfg.angle/2) * Math.PI/180;
  const radius = Math.min(cfg.range===Infinity ? COLS*CELL_W*1.5 : cfg.range, COLS*CELL_W*1.5);
  ctx.save();
  ctx.beginPath();
  ctx.rect(GRID_X, GRID_Y, COLS*CELL_W, ROWS*CELL_H);
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(center.x, center.y);
  ctx.arc(center.x, center.y, radius, -halfAngle, halfAngle);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  ctx.fill();
  ctx.strokeStyle = colorOverride || '#ffffff';
  ctx.globalAlpha = 0.85;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawTowers(){
  for(const t of G.towers){
    const cfg = NODES[t.key];
    const c = cellCenter(t.row,t.col);
    if(G.selected && G.selected.row===t.row && G.selected.col===t.col){
      drawFan(c, cfg, branchColor(cfg.branch));
    }
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(spriteScale, spriteScale);
    ctx.beginPath(); ctx.arc(0,6,34,0,Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2);
    ctx.fillStyle = cfg.color; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle = '#efd9a5'; ctx.stroke();
    ctx.font='34px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(cfg.emoji, 0, 2);
    ctx.font='bold 12px sans-serif';
    ctx.fillStyle='#ffd54f';
    ctx.beginPath(); ctx.arc(24,-24,11,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3e2723'; ctx.fillText(String(tierOf(t.key)+1), 24, -23);
    if(t.hp < t.maxHp){
      const w=52,h=6, x=-w/2, y=34;
      ctx.fillStyle='#1a2f42'; ctx.fillRect(x,y,w,h);
      ctx.fillStyle = t.hp/t.maxHp>0.4? '#66bb6a':'#e53935';
      ctx.fillRect(x,y,w*(t.hp/t.maxHp),h);
    }
    if(t.disabledTimer > 0){
      ctx.globalAlpha = 0.55;
      ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2);
      ctx.fillStyle = '#4a148c'; ctx.fill();
      ctx.globalAlpha = 1;
      ctx.font='26px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⚡✕', 0, 2);
    }
    if(G.selected && G.selected.row===t.row && G.selected.col===t.col){
      ctx.beginPath(); ctx.arc(0,0,38,0,Math.PI*2);
      ctx.lineWidth=3; ctx.strokeStyle='#ffee58'; ctx.stroke();
    }
    ctx.restore();
  }
}

function skinFor(type){
  return type==='heavy' ? '#c98a5a' : (type==='boss' ? '#d99a68' : '#e0a978');
}
function drawPirateHead(skin, eyepatch){
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0,-16,11,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#1a1a1a';
  if(eyepatch!=='left'){ ctx.beginPath(); ctx.arc(-4,-17,1.6,0,Math.PI*2); ctx.fill(); }
  if(eyepatch!=='right'){ ctx.beginPath(); ctx.arc(4,-17,1.6,0,Math.PI*2); ctx.fill(); }
  if(eyepatch){
    const ex = eyepatch==='left' ? -4 : 4;
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.ellipse(ex,-17,3.2,2.6,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-11,-20); ctx.lineTo(11,-14); ctx.stroke();
  }
  ctx.strokeStyle='#3e2110'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(-7,-21); ctx.lineTo(-2,-19); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-21); ctx.lineTo(2,-19); ctx.stroke();
  ctx.strokeStyle='#5d2e1a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-4,-10); ctx.lineTo(4,-10); ctx.stroke();
}

function shadeColor(hex, percent){
  let c = hex.replace('#','');
  if(c.length===3) c = c.split('').map(ch=>ch+ch).join('');
  const num = parseInt(c,16);
  let r=(num>>16)&0xff, g=(num>>8)&0xff, b=num&0xff;
  const amt = Math.round(2.55*percent);
  r=clamp(r+amt,0,255); g=clamp(g+amt,0,255); b=clamp(b+amt,0,255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
// ============ 海盜船隻 ============
function drawShipHull(w,h,color){
  const topW=w, botW=w*0.62;
  // 吃水陰影：船身壓在水面上的暗色橢圓，讓船有「浮在水裡」的重量感
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0,h*0.85,botW*0.72,h*0.5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fill();
  ctx.restore();
  drawShipReflection(w,h,color);
  drawWaterWake(w);
  ctx.beginPath();
  ctx.moveTo(-topW/2,0); ctx.lineTo(topW/2,0);
  ctx.lineTo(botW/2,h); ctx.lineTo(-botW/2,h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, shadeColor(color,16));
  grad.addColorStop(0.55, color);
  grad.addColorStop(1, shadeColor(color,-26));
  ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
  // 船板木紋：隨船身收窄的橫向甲板線
  ctx.strokeStyle='rgba(0,0,0,0.16)'; ctx.lineWidth=1;
  for(let yy=h*0.32; yy<h; yy+=Math.max(3,h*0.3)){
    const ratio = yy/h;
    const hw = (topW/2)*(1-ratio) + (botW/2)*ratio;
    ctx.beginPath(); ctx.moveTo(-hw,yy); ctx.lineTo(hw,yy); ctx.stroke();
  }
  // 船板直向拼縫，加強木材質感
  ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=0.8;
  for(let xx=-topW/2+6; xx<topW/2; xx+=8){
    ctx.beginPath(); ctx.moveTo(xx,1); ctx.lineTo(xx*0.65,h-1); ctx.stroke();
  }
  // 甲板邊緣高光
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-topW/2+4,1.5); ctx.lineTo(topW/2-4,1.5); ctx.stroke();
  // 水線反光
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-botW/2+2,h-1); ctx.lineTo(botW/2-2,h-1); ctx.stroke();
}
// 水中倒影：把船身鏡射到水面下方，並用波紋線打斷邊緣，模擬水面反射被波動打散的樣子
function drawShipReflection(w,h,color){
  const topW=w, botW=w*0.62;
  const t = Date.now()/260;
  ctx.save();
  ctx.globalAlpha = 0.16;
  ctx.translate(0, h+2);
  ctx.scale(1,-0.55);
  ctx.beginPath();
  ctx.moveTo(-topW/2,0); ctx.lineTo(topW/2,0);
  ctx.lineTo(botW/2,h); ctx.lineTo(-botW/2,h);
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1;
  for(let ry=h+4; ry<h+16; ry+=4.5){
    ctx.beginPath();
    for(let rx=-topW/2; rx<=topW/2; rx+=6){
      const yy = ry + Math.sin((rx+t*18)/9)*1.3;
      if(rx===-topW/2) ctx.moveTo(rx,yy); else ctx.lineTo(rx,yy);
    }
    ctx.stroke();
  }
  ctx.restore();
}
function drawWaterWake(w){
  const t = Date.now()/260;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(w/2+2,2); ctx.quadraticCurveTo(w/2+14,-2,w/2+26,4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-w/2-2,2); ctx.quadraticCurveTo(-w/2-14,-2,-w/2-26,-4); ctx.stroke();
  // 船側細碎泡沫，隨時間閃動位置，增加水花的真實感
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<4;i++){
    const fx = w/2+8+i*6 + Math.sin(t*3+i)*2;
    const fy = 2 + Math.cos(t*4+i)*2;
    ctx.beginPath(); ctx.arc(fx,fy,1.3-i*0.15,0,Math.PI*2); ctx.fill();
    const fx2 = -(w/2+8+i*6) - Math.sin(t*3+i)*2;
    ctx.beginPath(); ctx.arc(fx2,fy-2,1.3-i*0.15,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawMastSail(color,h,tilt){
  ctx.save(); if(tilt) ctx.rotate(tilt);
  // 支索：桅杆拉往船身兩側的細索，讓桅杆看起來有結構支撐
  ctx.strokeStyle='rgba(93,64,55,0.55)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-h+4); ctx.lineTo(-9,3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-h+4); ctx.lineTo(12,3); ctx.stroke();
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=2.4;
  ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-h); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0,-h+2); ctx.quadraticCurveTo(h*0.55,-h*0.5,2,-2);
  ctx.closePath();
  const sgrad = ctx.createLinearGradient(0,-h,h*0.5,0);
  sgrad.addColorStop(0, shadeColor(color,14));
  sgrad.addColorStop(1, shadeColor(color,-18));
  ctx.fillStyle=sgrad; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
  // 帆布摺線，增加布料的皺褶質感
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(0,-h*0.75); ctx.quadraticCurveTo(h*0.3,-h*0.5,1,-h*0.2); ctx.stroke();
  ctx.restore();
}

function drawEnemies(){
  for(const e of G.enemies){
    if(e.auraBuff){
      const ay = GRID_Y + e.row*CELL_H + CELL_H/2;
      ctx.save();
      ctx.beginPath(); ctx.arc(e.x, ay, e.auraBuff.radius, 0, Math.PI*2);
      ctx.strokeStyle='rgba(186,104,200,0.35)'; ctx.lineWidth=2; ctx.setLineDash([6,6]);
      ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
    const y = GRID_Y + e.row*CELL_H + CELL_H/2 + 6;
    const bob = (e.state==='attacking'||e.state==='ranged') ? Math.sin(Date.now()/70)*2.5 : Math.sin(Date.now()/300 + e.x)*1.5;
    ctx.save();
    ctx.translate(e.x, y+bob);
    ctx.scale(spriteScale, spriteScale);
    if(e.type==='medic'){
      drawMedicShip();
    } else if(e.onShip){
      ctx.save();
      ctx.rotate(Math.sin(Date.now()/450 + e.x)*0.03);
      drawShipSprite(e.type);
      ctx.restore();
    } else {
      drawPirateSprite(e.type);
    }
    if(e.frozenTimer>0){
      ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('❄️', 0, -30);
    }
    if(e.state==='rallying'){
      ctx.save();
      const pulse = 0.55+Math.abs(Math.sin(Date.now()/220))*0.45;
      ctx.globalAlpha = pulse*0.5;
      ctx.beginPath(); ctx.arc(0,-2,26,0,Math.PI*2);
      ctx.fillStyle = '#4fc3f7'; ctx.fill();
      ctx.globalAlpha = pulse;
      ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🛡️', 0, -34);
      ctx.restore();
    } else if(e.chargeActive){
      ctx.strokeStyle='rgba(255,171,64,0.7)'; ctx.lineWidth=2;
      for(let k=0;k<2;k++){ ctx.beginPath(); ctx.moveTo(20+k*6,-4+k*8); ctx.lineTo(32+k*6,-4+k*8); ctx.stroke(); }
    }
    ctx.restore();
    const curHp = e.onShip ? e.shipHp : e.hp;
    const curMax = e.onShip ? e.shipMaxHp : e.maxHp;
    const w=50*spriteScale, h=Math.max(4,7*spriteScale), x=e.x-w/2, ytop=y-46*spriteScale;
    ctx.fillStyle='#1a2f42'; ctx.fillRect(x,ytop,w,h);
    ctx.fillStyle = e.onShip ? '#4fc3f7' : (curHp/curMax>0.4? '#e53935':'#ffca28');
    ctx.fillRect(x,ytop,w*Math.max(0,curHp/curMax),h);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.strokeRect(x,ytop,w,h);
    if(e.shieldMax>0 && e.shield>0){
      const shW = w, shH = Math.max(3,4*spriteScale);
      ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x,ytop-shH-2,shW,shH);
      ctx.fillStyle='#80d8ff'; ctx.fillRect(x,ytop-shH-2,shW*(e.shield/e.shieldMax),shH);
    }
    ctx.fillStyle='#fff'; ctx.font=Math.max(9,Math.round(11*spriteScale))+'px sans-serif'; ctx.textAlign='center';
    let label = e.name + (e.onShip?'（船）':'');
    if(e.state==='rallying') label += (e.attackingTower ? '·架盾陣地(對轟中)' : '·架盾建立陣地');
    ctx.fillText(label, e.x, ytop-6*spriteScale - (e.shieldMax>0&&e.shield>0?8*spriteScale:0));
  }
}

    ctx.save();
    ctx.translate(p.x, p.y);

    if(p.nodeKey==='T0') drawBulletBasic();
    else if(p.nodeKey==='T1') drawCannonball();
    else drawBranchProjectile(NODES[p.nodeKey]);
    ctx.restore();
  }
}

let shopBuyRect = {x:0,y:0,w:0,h:0};
let heroAbilityRects = { a:{x:0,y:0,w:0,h:0}, b:{x:0,y:0,w:0,h:0}, c:{x:0,y:0,w:0,h:0}, d:{x:0,y:0,w:0,h:0} };
let heroShopBtnRect = {x:0,y:0,w:0,h:0};
function drawShopBar(){
  const y0 = GRID_Y + ROWS*CELL_H + 6;
  const barH = CANVAS_H - y0;
  const s = clamp(SHOP_BAR_H/100, 0.6, 1.2);
  ctx.fillStyle = '#20344a';
  ctx.fillRect(0,y0,CANVAS_W,barH);

  // ===== 左側：堡壘耐久度，貼齊城牆位置(左指區域上方就是城牆本體) =====
  const hpBarX = Math.round(16*s), hpBarW = Math.round(150*s), hpBarH = Math.round(16*s);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#a9c6e8'; ctx.font=Math.round(12*s)+'px sans-serif';
  ctx.fillText('堡壘耐久度', hpBarX, y0+Math.round(barH*0.24));
  const hpBarY = y0 + Math.round(barH*0.34);
  ctx.fillStyle = '#1a2f42'; ctx.fillRect(hpBarX,hpBarY,hpBarW,hpBarH);
  const hpRatio = clamp(G.baseHP/G.baseMaxHP, 0, 1);
  ctx.fillStyle = hpRatio>0.5?'#66bb6a':hpRatio>0.25?'#ffa726':'#e53935';
  ctx.fillRect(hpBarX,hpBarY,hpBarW*hpRatio,hpBarH);
  ctx.strokeStyle='#0e2a44'; ctx.strokeRect(hpBarX,hpBarY,hpBarW,hpBarH);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#eaf2fb'; ctx.font='bold '+Math.round(10*s)+'px sans-serif';
  ctx.fillText(Math.max(0,Math.ceil(G.baseHP))+' / '+G.baseMaxHP, hpBarX+hpBarW/2, hpBarY+hpBarH/2+1);

  // ===== 正中：暫停／選單／加速，放大置中(拇指偶爾伸過去戳一下即可) =====
  const btnH = Math.round(40*s);
  const pauseBtnW = Math.round(52*s), menuBtnW = Math.round(56*s), speedBtnW = Math.round(60*s);
  const midGap = Math.round(10*s);
  const midTotalW = pauseBtnW+midGap+menuBtnW+midGap+speedBtnW;
  const midStartX = Math.round(CANVAS_W/2 - midTotalW/2);
  const midY = y0 + Math.round(barH*0.5) - btnH/2;
  const pauseBtnX = midStartX;
  const menuBtnX = pauseBtnX + pauseBtnW + midGap;
  const speedBtnX = menuBtnX + menuBtnW + midGap;
  drawButton(pauseBtnX, midY, pauseBtnW, btnH, G.paused?'▶':'⏸', '#37474f', Math.round(18*s));
  drawButton(menuBtnX, midY, menuBtnW, btnH, '☰', '#37474f', Math.round(18*s));
  drawButton(speedBtnX, midY, speedBtnW, btnH, G.speedMul===2?'x2':'x1', '#2e5a3e', Math.round(15*s));
  hudRects.pause = {x:pauseBtnX, y:midY, w:pauseBtnW, h:btnH};
  hudRects.menu = {x:menuBtnX, y:midY, w:menuBtnW, h:btnH};
  hudRects.speed = {x:speedBtnX, y:midY, w:speedBtnW, h:btnH};

  // ===== 右下：購買新兵砲／技能a・b・c・d(2x2方陣)／技能商店，全部集中在右指固定區、放大尺寸 =====
  const iconSize = Math.round(barH*0.6);
  const buyW = Math.round(96*s);
  const shopBtnW = Math.round(72*s);
  const rGap = Math.round(10*s);
  const rightPad = Math.round(16*s);
  const gridGap = Math.round(4*s);
  const subSize = Math.round((iconSize*1.14 - gridGap)/2);
  const gridW = subSize*2 + gridGap;
  const rightTotalW = buyW + rGap + gridW + rGap + shopBtnW;
  let rx = CANVAS_W - rightTotalW - rightPad;
  const ry = y0 + Math.round(barH*0.5) - iconSize/2;
  const gridY = y0 + Math.round(barH*0.5) - gridW/2;

  const canBuy = G.gold >= TOWER_COST;
  shopBuyRect = {x:rx,y:ry,w:buyW,h:iconSize};
  ctx.save();
  roundRect(rx,ry,buyW,iconSize,10);
  ctx.fillStyle = G.placing ? '#ffb300' : (canBuy? '#2e7d32' : '#4a4a4a');
  ctx.fill();
  ctx.strokeStyle='#efd9a5'; ctx.lineWidth=2; ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=Math.round(iconSize*0.42)+'px sans-serif'; ctx.fillStyle='#fff';
  ctx.fillText(NODES.T0.emoji, rx+buyW/2, ry+iconSize*0.36);
  ctx.font='bold '+Math.round(iconSize*0.19)+'px sans-serif'; ctx.fillStyle='#ffe082';
  ctx.fillText(TOWER_COST+'💰'+(G.placing?'（放置中）':''), rx+buyW/2, ry+iconSize*0.76);
  ctx.restore();
  rx += buyW + rGap;

  const activeClass = G.hero.finalClass || G.hero.baseClass;
  const slotKeys = { a:'A', b:'S', c:'Z', d:'X' };
  ['a','b','c','d'].forEach((slot,i)=>{
    const col = i%2, row = Math.floor(i/2);
    const ix = rx + col*(subSize+gridGap);
    const iy = gridY + row*(subSize+gridGap);
    const unlocked = !!activeClass && G.hero.abilityLevel[slot]>0;
    ctx.save();
    roundRect(ix,iy,subSize,subSize,7);

// 關卡選擇格子的版面計算：改為依實際 CANVAS_W 動態縮放，
// 避免原本寫死 84px*10格 (共912px) 在畫布較窄時超出畫布邊界被裁掉。
function menuGridLayout(){
  const cols = 10;
  const marginX = 20;
  const gapX = clamp(Math.round(CANVAS_W*0.008), 4, 8);
  const avail = CANVAS_W - marginX*2 - (cols-1)*gapX;
  const boxW = clamp(Math.floor(avail/cols), 30, 84);
  const boxH = Math.round(boxW*64/84);
  const gapY = Math.max(10, Math.round(boxH*16/64));
  const totalW = cols*boxW + (cols-1)*gapX;
  const startX = (CANVAS_W-totalW)/2;
  const startY = 168;
  const s = boxW/84; // 用來等比縮放格內文字大小
  return {boxW,boxH,gapX,gapY,startX,startY,cols,s};
}

  });

function wrapText(text, maxWidth){
  const lines = [];
  let cur = '';
  for(const ch of text){
    const test = cur+ch;
    if(ctx.measureText(test).width > maxWidth && cur.length>0){
      lines.push(cur); cur = ch;
    } else {
      cur = test;
    }
  }
  if(cur) lines.push(cur);
  return lines;
}

// ============ 事件座標換算 ============
function getPos(evt){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
  const cx = (evt.touches && evt.touches.length) ? evt.touches[0].clientX : evt.clientX;
  const cy = (evt.touches && evt.touches.length) ? evt.touches[0].clientY : evt.clientY;
  return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY };
}

function inRect(x,y,rx,ry,rw,rh){ return x>=rx && x<=rx+rw && y>=ry && y<=ry+rh; }

function handleMenuClick(x,y){
  if(G.showChangelog){
    if(inRect(x,y,changelogCloseRect.x,changelogCloseRect.y,changelogCloseRect.w,changelogCloseRect.h)){
      G.showChangelog = false;
    }
    return;
  }
  if(inRect(x,y,changelogBtnRect.x,changelogBtnRect.y,changelogBtnRect.w,changelogBtnRect.h)){
    G.showChangelog = true;
    return;
  }
  const {boxW, boxH, gapX, gapY, startX, startY} = menuGridLayout();
  for(let n=1;n<=MAX_LEVEL;n++){
    const idx=n-1;
    const col = idx%10, row = Math.floor(idx/10);
    const bx = startX + col*(boxW+gapX);
    const by = startY + row*(boxH+gapY);
    if(inRect(x,y,bx,by,boxW,boxH) && G.unlocked[n]){
      AudioSys.sfx.uiClick();
      startLevel(n);
      return;
    }
  }
}

function applyUpgrade(tower, key){
  const n = NODES[key];
  tower.key = key;
  tower.maxHp = n.hp;
  tower.hp = n.maxHp !== undefined ? n.hp : n.hp;
  tower.hp = n.hp;
  tower.cooldown = 0.2;
  const c = cellCenter(tower.row, tower.col);
  spawnFloat(c.x, c.y-40, '合成！'+n.name, '#66ffcc');
}

function handleMergeChoiceClick(x,y){
  for(const r of mergeChoiceRects){
    if(inRect(x,y,r.x,r.y,r.w,r.h)){
      applyUpgrade(G.pendingMerge.tower, r.key);
      G.pendingMerge = null;
      AudioSys.sfx.towerUpgrade();
      return;
    }
  }
}

function handleHeroClassChoiceClick(x,y){
  for(const r of heroChoiceRects){
    if(inRect(x,y,r.x,r.y,r.w,r.h)){
      const pos = heroPos();
      if(G.pendingHeroClass==='base'){
        G.hero.baseClass = r.key;
        spawnFloat(pos.x, pos.y-70, '轉職：'+HERO_TREE[r.key].name+'！', '#ffd54f');
      } else {
        G.hero.finalClass = r.key;
        spawnFloat(pos.x, pos.y-70, '覺醒：'+HERO_TREE[r.key].name+'！', '#ffd54f');
      }
      G.pendingHeroClass = null;
      AudioSys.sfx.towerUpgrade();
      return;
    }
  }
}

function handleHeroShopClick(x,y){
  if(inRect(x,y,heroShopCloseRect.x,heroShopCloseRect.y,heroShopCloseRect.w,heroShopCloseRect.h)){
    G.showHeroShop = false;
    return;
  }
  for(const r of heroShopRects){
    if(inRect(x,y,r.x,r.y,r.w,r.h) && G.gold>=r.cost){
      G.gold -= r.cost;
      G.hero.abilityLevel[r.slot]++;
      AudioSys.sfx.towerUpgrade();
      return;
    }
  }
}

function handlePlayingClick(x,y){
  if(G.pendingHeroClass){ handleHeroClassChoiceClick(x,y); return; }
  if(G.pendingMerge){ handleMergeChoiceClick(x,y); return; }
  if(G.showHeroShop){ handleHeroShopClick(x,y); return; }

  if(G.levelComplete || G.gameOver){
    const cx = CANVAS_W/2;
    if(G.levelComplete && G.level<MAX_LEVEL && inRect(x,y,cx-190,CANVAS_H/2+10,180,54)){
      AudioSys.sfx.uiClick(); startLevel(G.level+1); return;
    }
    const menuBtnX = G.levelComplete ? cx+10 : cx+10;
    if(inRect(x,y,menuBtnX,CANVAS_H/2+10,180,54)){ AudioSys.sfx.uiClick(); G.screen='menu'; return; }
    if(G.gameOver && inRect(x,y,cx-190,CANVAS_H/2+10,180,54)){
      AudioSys.sfx.uiClick(); startLevel(G.level); return;
    }
    return;
  }

  if(inRect(x,y,hudRects.pause.x,hudRects.pause.y,hudRects.pause.w,hudRects.pause.h)){ G.paused = !G.paused; AudioSys.sfx.uiClick(); return; }
  if(inRect(x,y,hudRects.menu.x,hudRects.menu.y,hudRects.menu.w,hudRects.menu.h)){ G.screen='menu'; AudioSys.sfx.uiClick(); return; }
  if(inRect(x,y,hudRects.speed.x,hudRects.speed.y,hudRects.speed.w,hudRects.speed.h)){ G.speedMul = G.speedMul===1?2:1; AudioSys.sfx.uiClick(); return; }

  if(inRect(x,y,heroAbilityRects.a.x,heroAbilityRects.a.y,heroAbilityRects.a.w,heroAbilityRects.a.h)){ castAbility('a'); return; }
  if(inRect(x,y,heroAbilityRects.b.x,heroAbilityRects.b.y,heroAbilityRects.b.w,heroAbilityRects.b.h)){ castAbility('b'); return; }
  if(inRect(x,y,heroAbilityRects.c.x,heroAbilityRects.c.y,heroAbilityRects.c.w,heroAbilityRects.c.h)){ castAbility('c'); return; }
  if(inRect(x,y,heroAbilityRects.d.x,heroAbilityRects.d.y,heroAbilityRects.d.w,heroAbilityRects.d.h)){ castAbility('d'); return; }
  if(inRect(x,y,heroShopBtnRect.x,heroShopBtnRect.y,heroShopBtnRect.w,heroShopBtnRect.h)){ G.showHeroShop = true; AudioSys.sfx.uiClick(); return; }

  if(G.paused) return;

  for(let i=G.coins.length-1;i>=0;i--){
    const c = G.coins[i];
    const dx=x-c.x, dy=y-c.y;
    if(dx*dx+dy*dy <= COIN_HIT_RADIUS*COIN_HIT_RADIUS){
      G.gold += c.value;
      spawnFloat(c.x,c.y,'+'+c.value,'#ffd54f');
      G.coins.splice(i,1);
      AudioSys.sfx.coinPickup();
      return;
    }
  }

  if(inRect(x,y,shopBuyRect.x,shopBuyRect.y,shopBuyRect.w,shopBuyRect.h)){
    if(G.gold >= TOWER_COST){ G.placing = !G.placing; G.selected=null; AudioSys.sfx.uiClick(); }
    return;
  }

  const cell = cellFromPoint(x,y);
  if(cell){
    if(G.placing){
      if(!getTowerAt(cell.row,cell.col) && !isSeaCell(cell.row,cell.col) && G.gold>=TOWER_COST){
        G.gold -= TOWER_COST;
        G.towers.push({ row:cell.row, col:cell.col, key:'T0', hp:NODES.T0.hp, maxHp:NODES.T0.hp, cooldown:0.3, disabledTimer:0 });
        G.placing = false;
        AudioSys.sfx.towerPlace();
      }
      return;
    }
    const tower = getTowerAt(cell.row,cell.col);
    if(tower){
      if(!G.selected){ G.selected = { row:cell.row, col:cell.col }; return; }
      if(G.selected.row===cell.row && G.selected.col===cell.col){ G.selected=null; return; }
      const t1 = getTowerAt(G.selected.row,G.selected.col);
      if(t1 && t1.key===tower.key){
        const node = NODES[t1.key];
        if(node.next.length===0){
          const c = cellCenter(cell.row,cell.col);
          spawnFloat(c.x, c.y-40, '已是最高型態！', '#ff8a65');
          G.selected = null;
          AudioSys.sfx.towerMaxed();
        } else if(node.next.length===1){
          removeTower(t1);
          applyUpgrade(tower, node.next[0]);
          G.selected = null;
          AudioSys.sfx.towerUpgrade();
        } else {
          removeTower(t1);
          G.pendingMerge = { tower, options: node.next };
          G.selected = null;
          AudioSys.sfx.uiClick();
        }
      } else {
        G.selected = { row:cell.row, col:cell.col };
      }
    } else {
      G.selected = null;
    }
  }
}

function onClick(evt){
  evt.preventDefault();
  AudioSys.ensureCtx();
  AudioSys.startMusic();
  const {x,y} = getPos(evt);
  if(G.screen==='menu') handleMenuClick(x,y);
  else if(G.screen==='playing') handlePlayingClick(x,y);
}
function onMove(evt){
  const {x,y} = getPos(evt);
  G.hover.x = x; G.hover.y = y;
}

canvas.addEventListener('click', onClick);
canvas.addEventListener('touchstart', onClick, {passive:false});
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, {passive:false});

// ============ 鍵盤熱鍵(桌機加速操作用) ============
// F：購買新兵砲（等同點擊購買按鈕，再點戰場放置）
// A／S／Z／X：施放英雄技能 a／b／c／d（左手 home row + 下排，達到 Lv5 選定主職業後即可使用）
// D：開關英雄技能商店面板
function onKeyDown(evt){
  if(G.screen !== 'playing') return;
  if(evt.repeat) return;
  const tag = (evt.target && evt.target.tagName) || '';
  if(tag==='INPUT' || tag==='TEXTAREA') return;
  const key = evt.key.toLowerCase();
  if(key !== 'f' && key !== 'a' && key !== 's' && key !== 'd' && key !== 'z' && key !== 'x') return;
  evt.preventDefault();

  if(key==='f'){
    if(G.pendingHeroClass || G.pendingMerge || G.showHeroShop || G.paused || G.levelComplete || G.gameOver) return;
    if(G.gold >= TOWER_COST){ G.placing = !G.placing; G.selected = null; }
    return;
  }
  if(key==='d'){
    if(G.pendingHeroClass || G.pendingMerge) return;
    G.showHeroShop = !G.showHeroShop;
    return;
  }
  if(G.pendingHeroClass || G.pendingMerge || G.showHeroShop) return;
  if(key==='a'){ castAbility('a'); return; }
  if(key==='s'){ castAbility('b'); return; }
  if(key==='z'){ castAbility('c'); return; }
  if(key==='x'){ castAbility('d'); return; }
}
window.addEventListener('keydown', onKeyDown);

// ============ 音效開關按鈕 ============
const muteBtn = document.getElementById('muteBtn');
function refreshMuteBtn(){
  if(muteBtn) muteBtn.textContent = AudioSys.isMuted() ? '🔇' : '🔊';
}
if(muteBtn){
  refreshMuteBtn();
  const onMuteToggle = function(evt){
    evt.preventDefault();
    AudioSys.toggleMuted();
    AudioSys.startMusic();
    refreshMuteBtn();
  };
  muteBtn.addEventListener('click', onMuteToggle);
  muteBtn.addEventListener('touchstart', onMuteToggle, {passive:false});
}

// ============ 全螢幕 + 橫向鎖定 ============
const fsBtn = document.getElementById('fsBtn');
async function enterFullscreenLandscape(){
  const el = document.getElementById('wrap');
  try{
    if(el.requestFullscreen) await el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }catch(e){ }
  try{
    if(screen.orientation && screen.orientation.lock){
      await screen.orientation.lock('landscape');
    }
  }catch(e){ }
  setTimeout(resizeCanvas, 60);
}
if(fsBtn){
  fsBtn.addEventListener('click', function(evt){ evt.preventDefault(); enterFullscreenLandscape(); });
  fsBtn.addEventListener('touchstart', function(evt){ evt.preventDefault(); enterFullscreenLandscape(); }, {passive:false});
}
document.addEventListener('fullscreenchange', ()=>setTimeout(resizeCanvas,60));
document.addEventListener('webkitfullscreenchange', ()=>setTimeout(resizeCanvas,60));
window.addEventListener('resize', ()=>setTimeout(resizeCanvas,60));
window.addEventListener('orientationchange', ()=>setTimeout(resizeCanvas,200));
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>setTimeout(resizeCanvas,60));
}
resizeCanvas();

// ============ 主迴圈 ============
let lastTs = 0;
function loop(ts){
  const dt = Math.min(0.05, (ts-lastTs)/1000 || 0);
  lastTs = ts;
  update(dt);
  let shaking = G.screen!=='menu' && G.shake && G.shake.time>0;
  if(shaking){
    const m = G.shake.mag * (G.shake.time>0.05 ? 1 : G.shake.time/0.05);
    ctx.save();
    ctx.translate((Math.random()-0.5)*2*m, (Math.random()-0.5)*2*m);
  }
  if(G.screen==='menu') drawMenu(); else drawGame();
  if(shaking) ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
